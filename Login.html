<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Login</title>
  <link rel="icon" type="image/png" href="Prostarm logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d6efd;
      --primary-hover: #0b5ed7;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --error: #ef4444;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
    }
    .login-card {
      width: 360px;
      max-width: 92vw;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.08);
      padding: 28px 26px;
      animation: floatIn 300ms ease-out;
    }
    @keyframes floatIn {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    
    .brand {
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      text-align: center; 
      margin-bottom: 16px;
    }
    .main-logo {
      width: 220px; 
      height: auto;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    p.subtitle { margin: 0 0 18px; color: var(--muted); font-size: 0.95rem; }

    label { font-weight: 600; font-size: 0.9rem; display: block; margin: 12px 0 6px; }
    .field {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px;
      background: #fafafa;
    }
    .field input {
      border: none; outline: none; flex: 1; background: transparent; font-size: 0.98rem;
    }
    .toggle {
      cursor: pointer; color: var(--muted); font-size: 0.9rem; user-select: none;
    }
    .actions { margin-top: 16px; }
    button.btn-primary {
      width: 100%; padding: 12px 14px; border: none; border-radius: 10px;
      background: var(--primary); color: white; font-weight: 700; font-size: 1rem;
      cursor: pointer; box-shadow: 0 8px 16px rgba(13,110,253,0.25);
      transition: background 0.2s;
    }
    button.btn-primary:hover { background: var(--primary-hover); }
    
    /* Selection Screen Styles */
    #selectionSection { display: none; text-align: center; }
    .app-btn {
      width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #e5e7eb;
      border-radius: 10px; background: transparent; color: var(--text);
      font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s ease;
    }
    .app-btn:hover { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
    
    .logout-btn { border-color: #fca5a5; color: var(--error); margin-top: 10px; padding: 12px;}
    .logout-btn:hover { border-color: var(--error); background: #fef2f2; color: var(--error); }

    .msg { margin-top: 10px; font-size: 0.92rem; text-align: center; }
    .msg.error { color: var(--error); }
    .msg.success { color: var(--success); }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="Prostarm-logo.png" alt="ProstarM Logo" class="main-logo" onerror="this.style.display='none'">
      <h1>ProstarM Portal</h1>
      <p class="subtitle" id="formSubtitle">Sign in to continue</p>
    </div>

    <div id="loginSection">
      <form id="loginForm" autocomplete="off" novalidate>
        <label for="userId">User ID</label>
        <div class="field">
          <input type="text" id="userId" name="userId" placeholder="Enter User ID" required />
        </div>

        <label for="password">Password</label>
        <div class="field">
          <input type="password" id="password" name="password" placeholder="Enter Password" required />
          <span class="toggle" id="togglePwd">Show</span>
        </div>

        <div class="actions">
          <button type="submit" id="loginBtn" class="btn-primary">Login</button>
        </div>
        <div id="message" class="msg" aria-live="polite"></div>
      </form>
    </div>

    <div id="selectionSection">
      <h3 style="margin-top: 0; margin-bottom: 20px;">Select Application</h3>
      <button class="app-btn" onclick="window.location.href='Installation Tracker.html'">📊 Installation Tracker</button>
      <button class="app-btn" onclick="window.location.href='Incident Tracker.html'">🚨 Incident Tracker</button>
      <button class="app-btn logout-btn" onclick="logoutUser()">🚪 Logout</button>
    </div>

  </main>

  <script>
    // System Credentials
    const DEMO_USER = "CCTNS";
    const DEMO_PASS = "cctns@1234";

    const form = document.getElementById("loginForm");
    const messageEl = document.getElementById("message");
    const userIdEl = document.getElementById("userId");
    const passwordEl = document.getElementById("password");
    const togglePwdEl = document.getElementById("togglePwd");

    // Auto-login check
    if (sessionStorage.getItem('loggedIn') === 'true') {
        showSelectionScreen();
    }

    togglePwdEl.addEventListener("click", () => {
      const isPassword = passwordEl.type === "password";
      passwordEl.type = isPassword ? "text" : "password";
      togglePwdEl.textContent = isPassword ? "Hide" : "Show";
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const user = (userIdEl.value || "").trim();
      const pass = passwordEl.value || "";

      if (!user || !pass) {
        showMessage("Please fill in both User ID and Password.", "error");
        return;
      }

      if (user === DEMO_USER && pass === DEMO_PASS) {
        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("username", user);
        showSelectionScreen();
      } else {
        showMessage("Invalid credentials. Please try again.", "error");
      }
    });

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `msg ${type}`;
    }

    function showSelectionScreen() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('formSubtitle').textContent = 'Authentication successful';
      document.getElementById('selectionSection').style.display = 'block';
    }

    function logoutUser() {
        sessionStorage.removeItem("loggedIn");
        sessionStorage.removeItem("username");
        window.location.reload();
    }
  </script>
</body>
</html>
