<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login</title>
  <link rel="icon" type="image/png" href="Prostarm logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #2563eb; 
      --primary-hover: #1d4ed8; 
      --card: #ffffff; 
      --text-main: #0f172a; 
      --text-muted: #64748b; 
      --border: #e2e8f0;
      --error: #ef4444; 
      --input-bg: #f8fafc;
    }
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      /* Modern dark blue/slate gradient to match the tracker's vibe */
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
      min-height: 100vh; 
      display: grid; 
      place-items: center; 
      margin: 0; 
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-card { 
      background: var(--card); 
      border-radius: 24px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
      padding: 40px 32px; 
      width: 100%;
      box-sizing: border-box;
    }

    .brand { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      margin-bottom: 32px; 
    }

    .main-logo { 
      width: 200px; 
      height: auto; 
      margin-bottom: 16px; 
      object-fit: contain;
    }

    .brand h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 4px 0 0 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .field { 
      position: relative;
      display: flex; 
      align-items: center; 
    }

    .field svg {
      position: absolute;
      left: 14px;
      width: 20px;
      height: 20px;
      color: #94a3b8;
      transition: color 0.3s ease;
    }

    .field input { 
      width: 100%;
      background: var(--input-bg);
      border: 2px solid var(--border); 
      border-radius: 12px; 
      padding: 12px 12px 12px 42px; 
      font-size: 1rem; 
      font-family: inherit;
      color: var(--text-main);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .field input:focus + svg {
      color: var(--primary);
    }

    button { 
      width: 100%; 
      padding: 14px; 
      border: none; 
      border-radius: 12px; 
      background: linear-gradient(to right, var(--primary), #3b82f6); 
      color: white; 
      font-weight: 600; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled { 
      background: #94a3b8; 
      box-shadow: none;
      cursor: not-allowed; 
      opacity: 0.8;
    }

    .msg { 
      margin-top: 16px; 
      text-align: center; 
      color: var(--error); 
      font-size: 0.875rem; 
      font-weight: 500; 
      min-height: 20px;
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <main class="login-card">
      <div class="brand">
        <img src="Prostarm-logo.png" alt="Logo" class="main-logo" onerror="this.style.display='none'">
        <h2>Welcome Back</h2>
        <p>Sign in to the CCTNS Tracker</p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label for="userId">User ID</label>
          <div class="field">
            <input type="text" id="userId" placeholder="Enter your ID" required autocomplete="username" />
            <!-- User Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <div class="field">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <!-- Lock Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
        </div>
        
        <button type="submit" id="loginBtn">Secure Login</button>
        <div id="message" class="msg"></div>
      </form>
    </main>
  </div>
  
  <script>
    // Security check: Route to dashboard if already logged in[cite: 14]
    if (sessionStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'Incident Tracker.html';
    }

    // Your specific Power Automate Login URL[cite: 14]
    const LOGIN_API = "https://default000090a2d8654861ba6937e8e47451.72.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/a87f031f84bc442799055f58172f563e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=WC42qgB-f5c_q7kz-RSR6SEa39lUp8kutiHNnbP5Wzk";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("message");
      
      btn.disabled = true;
      btn.textContent = "Verifying...";
      msg.style.color = "#3b82f6"; // Modern blue while loading
      msg.textContent = "Connecting to secure server... (up to 30s)";

      // Create a 60-second timeout so the browser doesn't give up early[cite: 14]
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      try {
        const res = await fetch(LOGIN_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            inputUsername: document.getElementById("userId").value, 
            inputPassword: document.getElementById("password").value 
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId); // Stop the timer if it succeeds[cite: 14]
        const data = await res.json().catch(() => ({}));
        
        if (res.ok && data.status === "success") {
          sessionStorage.setItem("loggedIn", "true");
          window.location.href = 'Incident Tracker.html';
        } else {
          console.error("Login Error from PA:", data);
          msg.style.color = "var(--error)";
          msg.textContent = data.message || "Invalid credentials. Please try again.";
          btn.disabled = false; 
          btn.textContent = "Secure Login";
        }
      } catch(err) {
        clearTimeout(timeoutId);
        console.error("Network Error:", err);
        msg.style.color = "var(--error)";
        
        if (err.name === 'AbortError') {
            msg.textContent = "Request timed out. The server took too long.";
        } else {
            msg.textContent = "Server connection failed.";
        }
        
        btn.disabled = false; 
        btn.textContent = "Secure Login";
      }
    });
  </script>
</body>
</html>
